# Render.com Blueprint — provisions the whole TripStalker stack from this repo.
# Deploy: render.com -> New -> Blueprint -> connect this GitHub repo -> Apply.
# After the first deploy, set the `sync: false` env vars (see DEPLOY.md).
#
# NOTE: Render allows only ONE free PostgreSQL per account, so this blueprint
# does NOT create a database. Set DATABASE_URL on the API service to an existing
# Postgres (your current Render free DB, or a free Neon DB at neon.tech).

services:
  # --- Backend API (FastAPI) ---
  - type: web
    name: tripstalker-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Paste your Postgres connection string here in the Render dashboard
      # (existing Render free DB, or a free Neon DB). If left empty the app
      # falls back to ephemeral SQLite (data is lost on restart).
      - key: DATABASE_URL
        sync: false
      - key: PRICE_DROP_THRESHOLD
        value: "0.02"
      # Auto-generated secret protecting /api/cron/check-prices. Copy its value
      # into the GitHub repo secret CRON_SECRET (for the daily Action).
      - key: CRON_SECRET
        generateValue: true
      # Set to the deployed web URL after first deploy (e.g. https://tripstalker-web.onrender.com)
      - key: FRONTEND_ORIGIN
        sync: false

  # --- Frontend (React/Vite static build) ---
  - type: web
    name: tripstalker-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set to the deployed API URL after first deploy (e.g. https://tripstalker-api.onrender.com)
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Daily price check ---
  # Render Cron Jobs are a PAID feature, so this blueprint intentionally omits
  # one. The free alternative is the GitHub Action at
  # .github/workflows/daily-price-check.yml, which calls the API's
  # /api/cron/check-prices endpoint once a day. To use Render's native cron
  # instead, add a `type: cron` service running `python worker.py`.
